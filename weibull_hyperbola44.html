}

// ─── Simulate ─────────────────────────────────────────────
function doSimulate() {
  setBusy();
  setTimeout(() => {
  const model = document.getElementById('modelSelector').value;
  const effectiveModel = model === 'All' ? 'M0' : model;
  const wP = getWParams();
  const wbP = getWeibullParams();
  const sigmaM_range = [
    parseFloat(document.getElementById('sigmaM_min').value),
    parseFloat(document.getElementById('sigmaM_max').value),
  ];
  const sigmam_range = [
    parseFloat(document.getElementById('sigmam_min').value),
    parseFloat(document.getElementById('sigmam_max').value),
  ];
  const nPoints = parseInt(document.getElementById('n_points').value);
  const useCens = document.getElementById('useCensoring').checked;
  const runoutThr = useCens ? parseFloat(document.getElementById('runout_thr').value) : null;

  // ── Pre-correction of references BEFORE simulating ──────
  // σ_M0 must be strictly less than σ_M,min of the range
  let sigma_M0 = parseFloat(document.getElementById('p_sigmaM0').value);
  let N0       = parseFloat(document.getElementById('p_N0').value);
  const safeMargin = 0.9;
  if (sigma_M0 >= sigmaM_range[0]) {
    sigma_M0 = safeMargin * sigmaM_range[0];
    document.getElementById('p_sigmaM0').value = sigma_M0.toFixed(4);
    logWarn(`σ_M0 auto-corrected to ${sigma_M0.toFixed(4)} (must be < σ_M,min = ${sigmaM_range[0]})`);
  }
  // N₀ must be less than the runout threshold if active, or simply positive
  const runoutThrVal = parseFloat(document.getElementById('runout_thr').value);
  if (useCens && N0 >= runoutThrVal) {
    N0 = safeMargin * runoutThrVal;
    document.getElementById('p_N0').value = N0.toFixed(4);
    logWarn(`N₀ auto-corrected to ${N0.toFixed(4)} (must be < runout threshold = ${runoutThrVal})`);
  }
  const refP = { sigma_M0, N0 };

  clearLog();
  logAccent('Generating synthetic data...');
  const df = simulateData(effectiveModel, wP, wbP, refP, sigmaM_range, sigmam_range, nPoints, runoutThr);

  if (!df || df.length === 0) {
    logErr('Simulation failed: no valid points were generated. Check the parameters.');
    setReady();
    return;
  }

  const t = filterFinite(...Object.values(transformFatigueData(df, sigma_M0, N0, runoutThr||1e20)));
  state.pi1=t.pi1; state.pi2=t.pi2; state.pi3=t.pi3; state.cens=Array.from(t.cens);
  state.simDf = df;
  updateExtrema(df);

  logOk(`${t.pi1.length} transformed points ready.`);

  // Update caseTitle only if empty or currently set to a model name (not a user/file title)
  const caseTitleEl = document.getElementById('caseTitle');
  const modelNames = Object.keys(MODEL_FREE); // ['M0','M1',...,'M7']
  const currentTitle = caseTitleEl.value.trim();
  const isTitleAModelName = modelNames.includes(currentTitle) ||
    modelNames.some(m => currentTitle === 'Case_' + m);
  if (!currentTitle || isTitleAModelName) caseTitleEl.value = effectiveModel;

  // Show table
  document.getElementById('sec-results').classList.remove('hidden');
  const cont = document.getElementById('simTableContainer');
  cont.id = 'simTableContainer';
  const cols = Object.keys(df[0]);
  const colsWithR = ['sigmam', 'sigmaM', 'R', ...cols.filter(c => c !== 'sigmam' && c !== 'sigmaM')];
  const fmts = colsWithR.map(c => c==='N'?'sci':c==='runout'?'int':'6g');
  const tableRows = df.map(r => { const o = {sigmam: r.sigmam, sigmaM: r.sigmaM, R: r.sigmam/r.sigmaM}; cols.filter(c => c !== 'sigmam' && c !== 'sigmaM').forEach(c => o[c] = r[c]); return o; });
  makePaginatedTable(cont, tableRows, colsWithR, fmts, 'Simulated data');
  showTabByName('tab-simdata');
  document.getElementById('sec-results').scrollIntoView({behavior:'smooth', block:'start'});
  setReady();
  }, 10);
}

// ─── Plot curves (simulation) ────────────────────────────
function doPlotSim() {
  if (!state.pi1) { logWarn('No simulated data. Click "Simulate Data" first.'); return; }
  setBusy();
  setTimeout(() => {
  const model = document.getElementById('modelSelector').value;
  const effectiveModel = model === 'All' ? 'M0' : model;
  const wP = getWParams();
  const wbP = getWeibullParams();
  const refP = getRefParams();
  const best = { model: effectiveModel, ...wP, ...wbP, sigma_M0: refP.sigma_M0, N0: refP.N0 };
  clearLog();
  logAccent('Plotting percentile curves...');
  document.getElementById('sec-results').classList.remove('hidden');

  // ── Consult 'Include simulated data' option ─────────────────────────────
  const includeSimulated = document.getElementById('simAfterFit').checked;
  if (includeSimulated && state.rawDf) {
    // Overlay real data (in red) on top of simulated data scatter
    const useCens = document.getElementById('useCensoring').checked;
    const runoutThr = useCens ? parseFloat(document.getElementById('runout_thr').value) : 1e20;
    const tOrig = filterFinite(...Object.values(transformFatigueData(state.rawDf, refP.sigma_M0, refP.N0, runoutThr)));
    logInfo('Include simulated data: ON — real data overlaid in red.');
    plotCurves(best, state.pi1, state.pi2, state.pi3, refP.sigma_M0, refP.N0, state.coordSystem,
               tOrig.pi1, tOrig.pi2, tOrig.pi3);
  } else if (includeSimulated) {
    logInfo('Include simulated data: ON — no real data loaded, using simulated only.');
    plotCurves(best, state.pi1, state.pi2, state.pi3, refP.sigma_M0, refP.N0, state.coordSystem);
  } else {
    logInfo('Include simulated data: OFF — using simulated data only.');
    plotCurves(best, state.pi1, state.pi2, state.pi3, refP.sigma_M0, refP.N0, state.coordSystem);
  }

  showTabByName('tab-curves');
  document.getElementById('sec-results').scrollIntoView({behavior:'smooth', block:'start'});
  setReady();
  }, 10);
}

// ─── Estimate σ_M0 & N0 ──────────────────────────────────
async function doEstimateRefs() {
  if (!state.rawDf) { logWarn('No data loaded. Load a CSV file first.'); return; }
  setBusy();
  const df = state.rawDf;
  const useCens = document.getElementById('useCensoring').checked;
  const runoutThr = useCens ? parseFloat(document.getElementById('runout_thr').value) : 1e20;
  const nGrid = parseInt(document.getElementById('nGrid').value);
  const nRestGrid = parseInt(document.getElementById('nRestGrid').value);
  const nRestRefine = parseInt(document.getElementById('nRestRefine').value);
  const modelList = getSelectedModels();
  const method = document.querySelector('input[name="estMethod"]:checked').value;

  document.getElementById('btnEstimate').disabled = true;
  document.getElementById('btnFitManual').disabled = true;
  clearLog();
  logAccent(`Method: Option ${method}`);
  logInfo(`Models: ${modelList.join(', ')}`);
  logInfo(`Grid: ${nGrid}×${nGrid}, grid restarts=${nRestGrid}, refine restarts=${nRestRefine}`);

  setProgress(0,1,'Starting...');
  const allResults = [];

  if (method === '2') {
    // Option 2
    setProgress(0, nGrid*nGrid, 'Option 2: Joint grid search...');
    const results = await estimateReferences(df,
      {runoutThr, nGrid, nRestGrid, nRestRefine, modelList},
      (d,t,m) => setProgress(d,t,m));
    results.forEach(r => allResults.push(r));
  } else {
    // Option 1: independent per model
    const gridSize = nGrid*nGrid;
    const totalSteps = modelList.length * gridSize;
    for (let i = 0; i < modelList.length; i++) {
      const mod = modelList[i];
      logInfo(`── Estimating ${mod} (independent)...`);
      const res = await estimateOneModel(mod, df,
        {runoutThr, nGrid, nRestGrid, nRestRefine},
        (d,t,m) => setProgress(i*gridSize+d, totalSteps, m));
      if (!res) { logWarn(`  ${mod}: did not converge.`); continue; }
      allResults.push(res);
      logInfo(`  ${mod}: σ_M0=${res.sigma_M0.toFixed(4)}  N₀=${res.N0.toFixed(4)}  AIC=${res.AIC.toFixed(2)}`);
    }
  }

  document.getElementById('btnEstimate').disabled = false;
  document.getElementById('btnFitManual').disabled = false;

  if (allResults.length === 0) { logErr('No results obtained.'); setProgress(0,1,''); setReady(); return; }
  allResults.sort((a,b) => a.AIC - b.AIC);
  const best = allResults[0];
  logOk(`Best model: ${best.model}  AIC=${best.AIC.toFixed(2)}  BIC=${best.BIC.toFixed(2)}`);
  setProgress(1,1,'✔ Done');

  // Update case title only if empty or currently set to a model name
  const caseTitleEl3 = document.getElementById('caseTitle');
  const currentTitle3 = caseTitleEl3.value.trim();
  const modelNames3 = Object.keys(MODEL_FREE);
  const isTitleAModelName3 = modelNames3.includes(currentTitle3) ||
    modelNames3.some(m => currentTitle3 === 'Case_' + m);
  if (!currentTitle3 || isTitleAModelName3) caseTitleEl3.value = best.model;

  applyBestToWidgets(best, df);
  // Update model selector
  document.getElementById('modelSelector').value = best.model;
  // Sync checkboxes
  Object.keys(MODEL_FREE).forEach(m => {
    const el = document.getElementById('cb_'+m); if (el) el.checked = (m===best.model);
  });

  showResults(df, allResults, best);
  document.getElementById('sec-results').scrollIntoView({behavior:'smooth', block:'start'});

  setReady();
}

// ─── Fit (manual σ_M0, N0) ───────────────────────────────
async function doFitManual() {
  if (!state.rawDf) { logWarn('No data loaded. Load a CSV file first.'); return; }
  setBusy();
  const df = state.rawDf;
  const useCens = document.getElementById('useCensoring').checked;
  const runoutThr = useCens ? parseFloat(document.getElementById('runout_thr').value) : 1e20;
  let sigma_M0 = parseFloat(document.getElementById('p_sigmaM0').value);
  let N0       = parseFloat(document.getElementById('p_N0').value);
  const modelList = getSelectedModels();

  const minSM = Math.min(...df.map(r=>r.sigmaM));
  const minN  = Math.min(...df.map(r=>r.N));
  if (sigma_M0 >= minSM) {
    sigma_M0 = 0.9*minSM;
    document.getElementById('p_sigmaM0').value = sigma_M0.toFixed(4);
    logWarn(`σ_M0 corrected to ${sigma_M0.toFixed(4)}`);
  }
  if (N0 >= minN) {
    N0 = 0.9*minN;
    document.getElementById('p_N0').value = N0.toFixed(4);
    logWarn(`N₀ corrected to ${N0.toFixed(4)}`);
  }

  clearLog();
  logAccent(`Fitting models ${modelList.join(', ')} with σ_M0=${sigma_M0.toFixed(4)}  N₀=${N0.toFixed(4)}`);
  document.getElementById('btnEstimate').disabled = true;
  document.getElementById('btnFitManual').disabled = true;

  const {pi1,pi2,pi3,cens} = filterFinite(...Object.values(transformFatigueData(df, sigma_M0, N0, runoutThr)));

  const allResults = [];
  for (let i = 0; i < modelList.length; i++) {
    const mod = modelList[i];
    logInfo(`  ${mod}...`);
    setProgress(i, modelList.length, `Fitting ${mod}...`);
    await yieldToUI();
    const res = fitModel(mod, pi1, pi2, pi3, Array.from(cens));
    res.sigma_M0 = sigma_M0; res.N0 = N0;
    res.pi1=pi1; res.pi2=pi2; res.pi3=pi3; res.cens=Array.from(cens);
    allResults.push(res);
    logInfo(`    loglik=${res.loglik.toFixed(2)}  AIC=${res.AIC.toFixed(2)}`);
  }

  document.getElementById('btnEstimate').disabled = false;
  document.getElementById('btnFitManual').disabled = false;
  setProgress(1,1,'✔ Done');

  allResults.sort((a,b) => a.AIC - b.AIC);
  const best = allResults[0];
  logOk(`Best model: ${best.model}  AIC=${best.AIC.toFixed(2)}`);

  applyBestToWidgets(best, df);
  // Update case title only if empty or currently set to a model name
  const caseTitleElFM = document.getElementById('caseTitle');
  const currentTitleFM = caseTitleElFM.value.trim();
  const modelNamesFM = Object.keys(MODEL_FREE);
  const isTitleAModelNameFM = modelNamesFM.includes(currentTitleFM) ||
    modelNamesFM.some(m => currentTitleFM === 'Case_' + m);
  if (!currentTitleFM || isTitleAModelNameFM) caseTitleElFM.value = best.model;
  document.getElementById('modelSelector').value = best.model;
  Object.keys(MODEL_FREE).forEach(m => {
    const el = document.getElementById('cb_'+m); if (el) el.checked = (m===best.model);
  });

  showResults(df, allResults, best);
  document.getElementById('sec-results').scrollIntoView({behavior:'smooth', block:'start'});

  setReady();
}

            if (el) el.checked = true;
          });
          buildWParams('M0', MODEL_DEFAULTS['M0']);

          const df = parseCSV(ev.target.result);
          state.rawDf = df;
          updateExtrema(df);
          clearLog();
          logOk(`File dropped: ${file.name}  (${df.length} valid rows)`);
          logInfo(`Columns: ${Object.keys(df[0]).join(', ')}`);
          logInfo('Model selector set to "All". All model checkboxes activated.');
          const baseName = file.name.replace(/\.[^.]+$/, '');
          document.getElementById('caseTitle').value = baseName;
          document.getElementById('sec-results').classList.remove('hidden');
          const cont = document.getElementById('dataTableContainer');
          const cols = Object.keys(df[0]);
          const colsWithR = ['sigmam', 'sigmaM', 'R', ...cols.filter(c => c !== 'sigmam' && c !== 'sigmaM')];
          const fmts = colsWithR.map(c => c==='N'?'sci':c==='runout'?'int':'6g');
          const tableRows = df.map(r => { const o = {sigmam: r.sigmam, sigmaM: r.sigmaM, R: r.sigmam/r.sigmaM}; cols.filter(c => c !== 'sigmam' && c !== 'sigmaM').forEach(c => o[c] = r[c]); return o; });
          makePaginatedTable(cont, tableRows, colsWithR, fmts, 'Loaded fatigue data');
          showTabByName('tab-data');
          document.getElementById('sec-results').scrollIntoView({behavior:'smooth', block:'start'});
        } catch(e) { logErr('CSV parse error: ' + e.message); }
      };
      reader.readAsText(file);
    }
  });
})();
// ─── Botón de reinicio completo con confirmación ─────────────────────────
const resetBtn = document.getElementById('resetAndLoadBtn');
if (resetBtn) {
  resetBtn.addEventListener('click', function() {
    const userConfirmed = confirm(
      '⚠️ ATENCIÓN: Esto va a reiniciar completamente la aplicación.\n\n' +
      'Se perderán:\n' +
      '• Todos los datos cargados actualmente\n' +
      '• Resultados de ajustes previos\n' +
      '• Gráficos generados\n' +
      '• Datos simulados\n' +
      '• Configuraciones no guardadas\n\n' +
      'Después del reinicio, se abrirá el diálogo para cargar un nuevo fichero CSV.\n\n' +
      '¿Deseas continuar?'
    );

    if (!userConfirmed) return;

    sessionStorage.setItem('pendienteCarga', 'true');
    location.reload();
  });
}

// Al cargar la página, si hay una carga pendiente, abrimos el selector de archivos
window.addEventListener('load', function() {
  if (sessionStorage.getItem('pendienteCarga') === 'true') {
    sessionStorage.removeItem('pendienteCarga');
    const fileInput = document.getElementById('csvFileInput');
    if (fileInput) {
      setTimeout(() => {
        fileInput.click();
      }, 100);
    }
  }
});
// INIT
buildModelCheckboxes();
document.getElementById('modelSelector').value = 'All';
buildWParams('M0', MODEL_DEFAULTS['M0']);
Object.keys(MODEL_FREE).forEach(m => {
  const el = document.getElementById('cb_'+m);
  if (el) el.checked = true;
});
document.getElementById('p_lambda').value  = '0.5';
document.getElementById('p_delta').value   = '0.3';
document.getElementById('p_beta').value    = '2.5';
document.getElementById('p_sigmaM0').value = '40';
document.getElementById('p_N0').value      = '1000';
document.getElementById('caseTitle').value = '';

updateSlider('nGrid','nGridVal');
updateSlider('nRestGrid','nRestGridVal');
updateSlider('nRestRefine','nRestRefineVal');

logInfo('Weibull–Hyperbola Model v8 — simulation with guaranteed physical branch.');
logInfo('Reference auto-correction active. Rejection rate always reported.');
setReady();
</script>
