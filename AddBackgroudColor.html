<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Fondo de Color - Vista en Tiempo Real</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; margin:0; padding:30px; color:#333; }
        .container { max-width:1400px; margin:0 auto; background:white; border-radius:20px; box-shadow:0 15px 40px rgba(0,0,0,0.12); overflow:hidden; }
        header { background:linear-gradient(135deg,#667eea,#764ba2); color:white; padding:30px; text-align:center; }
        header h1 { margin:0; font-size:2em; }

        .main-content { padding:40px; display:grid; grid-template-columns: 1fr 1fr; gap:50px; align-items:start; }
        @media (max-width:1100px) { .main-content { grid-template-columns:1fr; } }

        .upload-btn { background:#667eea; color:white; padding:14px 36px; border-radius:50px; cursor:pointer; font-weight:600; box-shadow:0 6px 18px rgba(102,126,234,0.3); display:inline-block; margin-bottom:25px; transition: transform 0.2s; }
        .upload-btn:hover { transform:translateY(-3px); }

        /* Ruleta + deslizaderas alineadas verticalmente */
        .picker-and-paddings {
            display: grid;
            grid-template-columns: 320px 260px;
            gap: 30px;
            align-items: center;
        }

        #pickerContainer { background:#f8f9ff; padding:20px; border-radius:16px; box-shadow:0 8px 25px rgba(0,0,0,0.1); }
        #wheelPicker { width:100% !important; height:320px !important; }

        /* Deslizaderas más compactas y centradas - REDUCIDAS EN ALTURA */
        .padding-controls {
            display: flex;
            flex-direction: column;
            gap: 10px; /* Reducido el espacio entre deslizaderas */
            justify-content: center;
            height: 280px; /* Reducida la altura total */
        }
        .pad-group {
            background:#f0f2ff;
            padding:10px; /* Padding reducido */
            border-radius:10px;
            text-align:center;
        }
        .pad-group.pad-common {
            background:#e3f2fd;
            border:2px solid #667eea;
        }
        .pad-group label { font-weight:600; margin-bottom:6px; display:block; font-size:0.85em; }
        input[type="range"] { width:100%; height:8px; border-radius:4px; background:#ddd; outline:none; -webkit-appearance:none; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:#667eea;
            box-shadow:0 3px 10px rgba(102,126,234,0.4); cursor:pointer;
        }
        .pad-value { font-weight:bold; color:#667eea; font-size:1.1em; margin-top:3px; }

        /* Vista previa y descarga */
        #previewContainer { background:#fcfcff; padding:30px; border-radius:16px; box-shadow:inset 0 4px 15px rgba(0,0,0,0.05); margin-bottom:20px; text-align: center; }
        #preview { max-width:100%; max-height: 400px; border-radius:12px; box-shadow:0 15px 40px rgba(0,0,0,0.2); }

        #downloadBtn { margin:30px 0; background:linear-gradient(135deg,#667eea,#764ba2); color:white; border:none; padding:18px 50px; font-size:1.4em; border-radius:50px; cursor:pointer; box-shadow:0 10px 30px rgba(102,126,234,0.4); transition: transform 0.2s; }
        #downloadBtn:hover:not(:disabled) { transform:translateY(-4px); }
        #downloadBtn:disabled { background:#ccc; cursor:not-allowed; opacity:0.6; }

        .output-section {
            background:#f8f9ff;
            padding:20px;
            border-radius:14px;
        }
        .name-edit { display: flex; align-items: center; margin-bottom: 15px; }
        .name-edit label { font-weight: 600; }
        .name-edit input { padding:10px; width:100%; border:1px solid #ddd; border-radius:8px; margin-left:10px; }
        .extra-controls { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:15px; }
        .control { background:#fff; padding:16px; border-radius:12px; border:1px solid #eee; }
        .control label { font-weight:600; margin-bottom:8px; display:block; }
        .control select, .control input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd; }
        
        .color-preview { 
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
            display: inline-block; 
            margin-left: 10px; 
            vertical-align: middle;
            border: 2px solid #fff;
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5"></script>
</head>
<body>
    <div class="container">
        <header><h1>✨ Añadir Fondo de Color – Vista en Tiempo Real</h1></header>

        <div class="main-content">
            <!-- IZQUIERDA -->
            <div class="left-column">
                <label class="upload-btn" for="fileInput">Seleccionar imagen</label>
                <input type="file" id="fileInput" accept="image/*" style="display:none;">

                <div class="picker-and-paddings">
                    <div id="pickerContainer">
                        <div id="wheelPicker"></div>
                    </div>

                    <div class="padding-controls">
                        <div class="pad-group pad-common">
                            <label>Margen común</label>
                            <input type="range" id="padAll" min="0" max="300" value="80">
                            <div class="pad-value"><span id="vAll">80</span> px</div>
                        </div>
                        <div class="pad-group"><label>Arriba</label><input type="range" id="padTop" min="0" max="300" value="80"><div class="pad-value"><span id="vTop">80</span> px</div></div>
                        <div class="pad-group"><label>Derecha</label><input type="range" id="padRight" min="0" max="300" value="80"><div class="pad-value"><span id="vRight">80</span> px</div></div>
                        <div class="pad-group"><label>Abajo</label><input type="range" id="padBottom" min="0" max="300" value="80"><div class="pad-value"><span id="vBottom">80</span> px</div></div>
                        <div class="pad-group"><label>Izquierda</label><input type="range" id="padLeft" min="0" max="300" value="80"><div class="pad-value"><span id="vLeft">80</span> px</div></div>
                    </div>
                </div>
            </div>

            <!-- DERECHA -->
            <div class="right-column">
                <div id="previewContainer">
                    <canvas id="preview"></canvas>
                    <p id="previewMessage" style="margin-top: 15px; color: #666;">Selecciona una imagen para comenzar</p>
                </div>

                <button id="downloadBtn" disabled>Descargar imagen</button>

                <div class="output-section">
                    <div class="name-edit">
                        <label>Nombre de salida:</label>
                        <input type="text" id="outputName" placeholder="Se genera automáticamente">
                    </div>

                    <div class="extra-controls">
                        <div class="control">
                            <label>Formato</label>
                            <select id="format">
                                <option value="png">PNG (sin pérdida)</option>
                                <option value="jpeg">JPG</option>
                                <option value="webp">WebP</option>
                            </select>
                        </div>
                        <div class="control">
                            <label>Calidad <span id="qualityVal">90</span>%</label>
                            <input type="range" id="quality" min="10" max="100" value="90">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Inicializar el selector de color
        const colorPicker = new iro.ColorPicker("#wheelPicker", {
            width: 280,
            color: "#ff6b6b",
            layout: [
                { component: iro.ui.Wheel },
                { component: iro.ui.Slider, options: { sliderType: 'hue' } },
                { component: iro.ui.Slider, options: { sliderType: 'saturation' } },
                { component: iro.ui.Slider, options: { sliderType: 'value' } },
            ]
        });

        const canvas = document.getElementById('preview');
        const ctx = canvas.getContext('2d');
        const previewContainer = document.getElementById('previewContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const fileInput = document.getElementById('fileInput');
        const outputNameInput = document.getElementById('outputName');
        const formatSelect = document.getElementById('format');
        const qualityInput = document.getElementById('quality');
        const qualityVal = document.getElementById('qualityVal');
        const previewMessage = document.getElementById('previewMessage');

        let img = new Image();
        let originalFileName = '';
        let currentExtension = 'png';

        // Mostrar el contenedor de vista previa desde el inicio
        previewContainer.style.display = 'block';
        
        // Dibujar un estado inicial
        drawInitialState();

        // Actualizar calidad
        qualityInput.addEventListener('input', () => {
            qualityVal.textContent = qualityInput.value;
            if (img.src) {
                draw();
            }
        });

        // Actualizar extensión cuando cambia el formato
        formatSelect.addEventListener('change', function() {
            currentExtension = this.value === 'jpeg' ? 'jpg' : this.value;
            updateOutputName();
            if (img.src) {
                draw();
            }
        });

        // Función para actualizar el nombre de salida
        function updateOutputName() {
            if (originalFileName) {
                const dotIndex = originalFileName.lastIndexOf('.');
                const baseName = dotIndex === -1 ? originalFileName : originalFileName.substring(0, dotIndex);
                const newName = `${baseName}_con_fondo.${currentExtension}`;
                outputNameInput.value = newName;
                outputNameInput.placeholder = newName;
            }
        }

        // Función para actualizar todos los valores en pantalla
        function updateValueDisplays() {
            ['Top','Right','Bottom','Left','All'].forEach(s => {
                const val = document.getElementById('pad' + s).value;
                document.getElementById('v' + s).textContent = val;
            });
        }

        // Márgenes individuales → actualizan vista
        ['Top','Right','Bottom','Left'].forEach(dir => {
            document.getElementById('pad' + dir).addEventListener('input', function() {
                document.getElementById('v' + dir).textContent = this.value;
                if (img.src) {
                    draw();
                } else {
                    drawInitialState();
                }
            });
        });

        // Margen común → sincroniza los 4
        document.getElementById('padAll').addEventListener('input', function() {
            const val = this.value;
            ['Top','Right','Bottom','Left'].forEach(dir => {
                document.getElementById('pad' + dir).value = val;
                document.getElementById('v' + dir).textContent = val;
            });
            document.getElementById('vAll').textContent = val;
            if (img.src) {
                draw();
            } else {
                drawInitialState();
            }
        });

        // Cargar imagen
        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;

            originalFileName = file.name;
            updateOutputName();

            const reader = new FileReader();
            reader.onload = e => {
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        // Cuando la imagen carga → mostrar y dibujar
        img.onload = () => {
            previewMessage.style.display = 'none';
            draw();
        };

        // Redibujar siempre que cambie color o cualquier margen
        colorPicker.on('color:change', () => {
            if (img.src) {
                draw();
            } else {
                drawInitialState();
            }
        });

        // Función para dibujar el estado inicial (sin imagen)
        function drawInitialState() {
            const t = +document.getElementById('padTop').value;
            const r = +document.getElementById('padRight').value;
            const b = +document.getElementById('padBottom').value;
            const l = +document.getElementById('padLeft').value;

            // Tamaño para el canvas
            canvas.width = 400;
            canvas.height = 300;

            // Fondo de color
            ctx.fillStyle = colorPicker.color.hexString;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Mensaje de instrucción
            ctx.fillStyle = '#fff';
            ctx.font = '18px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('Selecciona una imagen para comenzar', canvas.width/2, canvas.height/2);
            
            downloadBtn.disabled = true;
            previewMessage.style.display = 'block';
        }

        // Función principal para dibujar con imagen
        function draw() {
            if (!img.src) {
                drawInitialState();
                return;
            }

            const t = +document.getElementById('padTop').value;
            const r = +document.getElementById('padRight').value;
            const b = +document.getElementById('padBottom').value;
            const l = +document.getElementById('padLeft').value;

            canvas.width = img.naturalWidth + l + r;
            canvas.height = img.naturalHeight + t + b;

            // Fondo de color - CORREGIDO: usar hexString en lugar de hex
            ctx.fillStyle = colorPicker.color.hexString;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dibujar imagen centrada con los márgenes
            ctx.drawImage(img, l, t, img.naturalWidth, img.naturalHeight);

            downloadBtn.disabled = false;
        }

        // Descarga
        downloadBtn.addEventListener('click', () => {
            const format = formatSelect.value;
            const mime = format === 'png' ? 'image/png' : format === 'jpeg' ? 'image/jpeg' : 'image/webp';
            const quality = format === 'png' ? 1 : qualityInput.value / 100;
            const finalName = outputNameInput.value.trim() || outputNameInput.placeholder;

            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = finalName;
                a.click();
                URL.revokeObjectURL(url);
            }, mime, quality);
        });
        
        // Inicializar la vista
        updateValueDisplays();
    </script>
</body>
</html>
